appName: pulse-backend
environment: dev

image:
  repository: YOUR_ECR_ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/pulse-backend
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 8000

env:
  PORT: "8000"
  # DATABASE_URL: "" # set via --set env.DATABASE_URL=... in CI

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
