appName: pulse-backend
environment: dev

image:
  repository: YOUR_ECR_ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/pulse-backend
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 8080         # port your Go app listens on

# Environment variables injected into the container
env:
  GIN_MODE: release  # or whatever env vars your Go app needs
  PORT: "8080"
  # DATABASE_URL: "" # set via --set env.DATABASE_URL=... in CI

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
