apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  namespace: prod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - pulse.tipsytypes.com
      secretName: apps-tls-prod
  rules:
    - host: pulse.tipsytypes.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: pulse-backend-service
                port:
                  number: 8000
