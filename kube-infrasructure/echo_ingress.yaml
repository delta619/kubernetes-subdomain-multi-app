# PROD ingress — deployed on the prod EC2 instance
# Handles *.tipsytypes.com routing to individual services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - pulse.tipsytypes.com
        # Add more hosts here as you deploy more apps:
        # - api.tipsytypes.com
        # - app.tipsytypes.com
      secretName: apps-tls-prod
  rules:
    - host: pulse.tipsytypes.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: pulse-backend-service
                port:
                  number: 8000
    # Duplicate this block for each additional app:
    # - host: api.tipsytypes.com
    #   http:
    #     paths:
    #       - pathType: Prefix
    #         path: "/"
    #         backend:
    #           service:
    #             name: my-api-service
    #             port:
    #               number: 3000
