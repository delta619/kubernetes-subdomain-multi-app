name: Terraform

on:
  push:
    branches: [main]
    paths: ["terraform/**"]
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_ENV: ${{ github.event.inputs.environment || 'default' }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }} (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select ${{ env.TF_ENV }} || terraform workspace new ${{ env.TF_ENV }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="ssh_public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="infra_repo_url=https://github.com/${{ github.repository }}.git" \
            -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform plan -destroy \
            -var="ssh_public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="infra_repo_url=https://github.com/${{ github.repository }}.git" \
            -out=tfplan-destroy
          terraform apply tfplan-destroy

      - name: Show outputs
        if: github.event.inputs.action == 'apply'
        run: terraform output
