name: Build & Deploy to Dev

on:
  repository_dispatch:
    types: [build-and-deploy-dev]
  workflow_dispatch:
    inputs:
      app:
        description: "App name (e.g. pulse-backend)"
        required: true
      repo:
        description: "App GitHub repo (e.g. delta619/daily-pulse)"
        required: true
      ref:
        description: "Git branch to build"
        required: true
        default: "main"

jobs:
  build-and-deploy:
    name: Build & deploy to dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Set variables
        id: vars
        run: |
          echo "app=${{ github.event.client_payload.app || github.event.inputs.app }}" >> $GITHUB_OUTPUT
          echo "repo=${{ github.event.client_payload.app_repo || github.event.inputs.repo }}" >> $GITHUB_OUTPUT
          echo "ref=${{ github.event.client_payload.ref || github.event.inputs.ref || 'main' }}" >> $GITHUB_OUTPUT
          echo "registry=436630933245.dkr.ecr.ap-south-1.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.vars.outputs.repo }}
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: app-source

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        run: |
          IMAGE=${{ steps.vars.outputs.registry }}/$(echo "${{ steps.vars.outputs.app }}" | tr '[:upper:]' '[:lower:]'):${{ steps.vars.outputs.ref }}
          docker build -t $IMAGE ./app-source
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to dev EC2
        uses: appleboy/ssh-action@v1
        env:
          PULSE_MONGODB_URI:        ${{ secrets.PULSE_MONGODB_URI }}
          PULSE_OPENAI_API_KEY:     ${{ secrets.PULSE_OPENAI_API_KEY }}
          PULSE_SENDGRID_API_KEY:   ${{ secrets.PULSE_SENDGRID_API_KEY }}
          PULSE_NEWSAPI_API_KEY:    ${{ secrets.PULSE_NEWSAPI_API_KEY }}
          PULSE_NEWRELIC_LICENSE_KEY: ${{ secrets.PULSE_NEWRELIC_LICENSE_KEY }}
        with:
          host:     ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:  600s
          envs:     PULSE_MONGODB_URI,PULSE_OPENAI_API_KEY,PULSE_SENDGRID_API_KEY,PULSE_NEWSAPI_API_KEY,PULSE_NEWRELIC_LICENSE_KEY
          script: |
            set -e
            APP="${{ steps.vars.outputs.app }}"
            cd /home/ubuntu/infra && git fetch origin && git reset --hard origin/main

            IMAGE="${{ steps.build.outputs.image }}"
            IMAGE_REPO=$(echo "$IMAGE" | cut -d: -f1)
            IMAGE_TAG=$(echo "$IMAGE" | cut -d: -f2)

            kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

            # Refresh ECR pull secret (tokens expire every 12h)
            kubectl create secret docker-registry ecr-secret \
              --namespace prod \
              --docker-server=436630933245.dkr.ecr.ap-south-1.amazonaws.com \
              --docker-username=AWS \
              --docker-password=$(aws ecr get-login-password --region ap-south-1) \
              --dry-run=client -o yaml | kubectl apply -f -

            # App-specific secrets
            if [ "$APP" = "pulse-backend" ]; then
              kubectl create secret generic pulse-backend-secrets \
                --namespace prod \
                --from-literal=MONGODB_URI="$PULSE_MONGODB_URI" \
                --from-literal=OPENAI_API_KEY="$PULSE_OPENAI_API_KEY" \
                --from-literal=SENDGRID_API_KEY="$PULSE_SENDGRID_API_KEY" \
                --from-literal=NEWSAPI_API_KEY="$PULSE_NEWSAPI_API_KEY" \
                --from-literal=NEWRELIC_LICENSE_KEY="$PULSE_NEWRELIC_LICENSE_KEY" \
                --dry-run=client -o yaml | kubectl apply -f -
            fi

            helm upgrade --install $APP ./$APP/chart \
              --namespace prod \
              --set image.repository="$IMAGE_REPO" \
              --set image.tag="$IMAGE_TAG" \
              --set image.pullPolicy=Always \
              --set imagePullSecret=ecr-secret \
              --set env.APP_ENV=production \
              --timeout 10m

            kubectl rollout restart deployment/${APP}-deployment -n prod
            kubectl rollout status deployment/${APP}-deployment -n prod --timeout=5m
            kubectl get pods -n prod -l app=$APP
