name: Build & Deploy to Dev

on:
  repository_dispatch:
    types: [build-and-deploy-dev]
  workflow_dispatch:
    inputs:
      app:
        description: "App name (e.g. pulse-backend)"
        required: true
      repo:
        description: "App GitHub repo (e.g. delta619/daily-pulse)"
        required: true
      ref:
        description: "Git SHA or branch to build"
        required: true
        default: "main"

env:
  AWS_REGION:  ap-south-1
  ECR_REGISTRY: 436630933245.dkr.ecr.ap-south-1.amazonaws.com
  APP:  ${{ github.event.client_payload.app  || github.event.inputs.app }}
  REPO: ${{ github.event.client_payload.repo || github.event.inputs.repo }}
  REF:  ${{ github.event.client_payload.ref  || github.event.inputs.ref }}

jobs:
  build-and-deploy:
    name: Build ${{ github.event.client_payload.app || github.event.inputs.app }} → dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.app_repo || github.event.inputs.repo }}
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: app-source

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.APP }}:${{ env.REF }}
          docker build -t $IMAGE ./app-source
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to dev EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:  120s
          script: |
            set -e
            cd /home/ubuntu/infra && git pull

            IMAGE="${{ steps.build.outputs.image }}"
            IMAGE_REPO=$(echo "$IMAGE" | cut -d: -f1)
            IMAGE_TAG=$(echo "$IMAGE" | cut -d: -f2)

            # Log in to ECR from EC2
            aws ecr get-login-password --region ap-south-1 \
              | docker login --username AWS --password-stdin \
                436630933245.dkr.ecr.ap-south-1.amazonaws.com

            helm upgrade --install ${{ env.APP }} ./${{ env.APP }}/chart \
              --set image.repository="$IMAGE_REPO" \
              --set image.tag="$IMAGE_TAG" \
              --set image.pullPolicy=Always \
              --atomic --timeout 3m

            echo "Deployed ${{ env.APP }} to dev"
            kubectl get pods -l app=${{ env.APP }}
